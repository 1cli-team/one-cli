# Build the docs site for PR/push confidence. Production deploys are handled
# by the Vercel project linked to apps/docs and the 1cli.dev domain.

name: Docs

on:
  pull_request:
    paths:
      - "apps/docs/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
  push:
    branches: [master]
    paths:
      - "apps/docs/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.14.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: apps/docs/pnpm-lock.yaml

      - name: Install docs deps
        working-directory: apps/docs
        run: pnpm install --frozen-lockfile

      - name: Build docs site
        working-directory: apps/docs
        run: pnpm build
