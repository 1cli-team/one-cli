openapi: 3.0.3
info:
  title: Go API Service
  version: 0.1.0
paths:
  /:
    get:
      summary: Service metadata
      responses:
        "200":
          description: Service metadata
  /health:
    get:
      summary: Health check
      responses:
        "200":
          description: Healthy
        "503":
          description: Dependency unavailable
  /auth/login:
    post:
      summary: Login
      responses:
        "200":
          description: JWT token
        "401":
          description: Invalid credentials
  /api/users:
    get:
      summary: List users
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Users
    post:
      summary: Create user
      security:
        - bearerAuth: []
      responses:
        "201":
          description: Created user
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
